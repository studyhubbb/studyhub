<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard - StudyHub</title>
</head>
<body>

    <h1>Welcome to StudyHub 🎓</h1>

    <h2>Student Dashboard</h2>

    <!-- STUDY TIMER -->
    <div>
        <h3>Study Timer</h3>
        <a href="/timer">
            <button>Open Timer</button>
        </a>
    </div>

    <hr>

    <!-- LEADERBOARD -->
    <div>
        <h3>Leaderboard</h3>
        <a href="/leaderboard">
            <button>View Leaderboard</button>
        </a>
    </div>

    <hr>

    <!-- NOTES -->
    <div>
        <h3>Notes</h3>
        <a href="/notes">
            <button>Open Notes</button>
        </a>
    </div>

    <hr>

    <!-- CHAT -->
    <div>
        <h3>Class Chat</h3>
        <a href="/chat">
            <button>Open Chat</button>
        </a>
    </div>

    <hr>

    <!-- QUIZ -->
    <div>
        <h3>Quizzes</h3>
        <a href="/quiz">
            <button>Open Quiz</button>
        </a>
    </div>

    <hr>

    <!-- GOALS -->
    <div>
        <h3>Daily Goals</h3>
        <a href="/goals">
            <button>Set Goals</button>
        </a>
    </div>

    <hr>

    <!-- LOGOUT (simple reset for now) -->
    <div>
        <a href="/student">
            <button>Logout</button>
        </a>
    </div>

</body>
</html>
