<!DOCTYPE html>
<html>
<head>
    <title>Teacher Login - StudyHub</title>
</head>
<body>

    <h1>Teacher Portal 👨‍🏫</h1>

    <!-- TEACHER REGISTER -->
    <h2>Teacher Register</h2>

    <form action="/teacher_register" method="POST">

        <input type="text" name="name" placeholder="Name" required>
        <br><br>

        <input type="email" name="email" placeholder="Email" required>
        <br><br>

        <input type="password" name="password" placeholder="Password" required>
        <br><br>

        <input type="text" name="secret" placeholder="Teacher Secret Code" required>
        <br><br>

        <button type="submit">Register as Teacher</button>

    </form>

    <hr>

    <!-- TEACHER LOGIN -->
    <h2>Teacher Login</h2>

    <form action="/teacher_login" method="POST">

        <input type="email" name="email" placeholder="Email" required>
        <br><br>

        <input type="password" name="password" placeholder="Password" required>
        <br><br>

        <button type="submit">Login</button>

    </form>

    <hr>

    <a href="/student">Go to Student Login</a>

</body>
</html>
