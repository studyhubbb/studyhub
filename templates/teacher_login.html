<!DOCTYPE html>
<html>
<head>
    <title>Teacher Login - StudyHub</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="nav">
    <div>StudyHub 📚</div>
    <div>
        <a href="/student">Student</a>
        <a href="/teacher">Teacher</a>
    </div>
</div>

<div class="container">

    <h1>Teacher Portal 👨‍🏫</h1>

    <h2>Teacher Register</h2>
    <form action="/teacher_register" method="POST">
        <input type="text" name="name" placeholder="Name" required><br><br>
        <input type="email" name="email" placeholder="Email" required><br><br>
        <input type="password" name="password" placeholder="Password" required><br><br>
        <input type="text" name="secret_code" placeholder="Teacher Secret Code" required><br><br>
        <button type="submit">Register</button>
    </form>

    <hr>

    <h2>Teacher Login</h2>
    <form action="/teacher_login" method="POST">
        <input type="email" name="email" placeholder="Email" required><br><br>
        <input type="password" name="password" placeholder="Password" required><br><br>
        <button type="submit">Login</button>
    </form>

</div>

</body>
</html>
