<!DOCTYPE html><html>
<head>
    <title>Upload PDF</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body><div class="nav">
    <div><strong>📄 Upload PDF</strong></div>
</div><div class="container"><div class="card"><h1>Upload Study Material</h1><form method="POST"
      enctype="multipart/form-data"><input
    type="text"
    name="title"

    name="pdf"
    accept=".pdf"
    required>

<br><br>

<button type="submit">
    Upload PDF
</button>

</form></div></div></body>
</html>
