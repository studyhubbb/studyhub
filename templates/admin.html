<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - StudyHub</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 40px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
        }

        .user {
            background: #eee;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🛠 Admin Panel</h1>

    <hr>

    <!-- CHANGE TEACHER SECRET CODE -->
    <h3>Change Teacher Secret Code</h3>

    <form action="/change_secret" method="POST">

        <input type="text" name="secret" placeholder="New Teacher Secret Code" required>

        <button type="submit">Update Code</button>

    </form>

    <hr>

    <!-- USERS LIST -->
    <h3>All Users</h3>

    {% for user in users %}

        <div class="user">

            <p><b>Name:</b> {{ user.name }}</p>
            <p><b>Email:</b> {{ user.email }}</p>
            <p><b>Role:</b> {{ user.role }}</p>
            <p><b>XP:</b> {{ user.xp }}</p>

        </div>

    {% endfor %}

    <hr>

    <a href="/teacher_dashboard">
        <button>Back</button>
    </a>

</div>

</body>
</html>
